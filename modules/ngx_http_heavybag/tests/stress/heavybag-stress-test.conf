# ngx_http_heavybag_module -- dedicated STRESS / load-test config
# (campaign ledger: docs/stress-campaign.md). Mirrors the structure of
# heavybag-replay-test.conf / heavybag-stat-test.conf but with its OWN port band
# (283xx http, 2839x status/stream, 2838x mail) so it never clashes with the
# 28xxx stat ports or the 281xx replay ports, and with the knobs the stress
# scenarios need that the replay conf deliberately omits.
#
# WHAT THIS CONF FIXES (reproducibility -- the load harness varies ONLY the
# request-side parameters via env, never these):
#   * worker_processes >= 2, BAKED here (NOT inherited from the replay/sandbox
#     conf's `1`). With a single worker the S3 lock-free shm race surface is a
#     silent no-op -- every counter bump is serialised on one core. The perf
#     scenarios may render-override this to the host core count; the default 2
#     guarantees real cross-worker contention even on a render that forgets to.
#   * waf_rate_zone is declared in http{} (size=16m). The STREAM head resolves
#     this SAME zone by name ("waf_rate") + tag in init_module; if it is missing
#     the stream rate limiter silently fails open (only `nginx -t` WARNs). 16m
#     is sized for the many-IP rate sweep (S2) without LRU eviction noise.
#   * a full list-set on the enforce/detect vhosts so every request pays the
#     worst-case matcher-chain cost (this is the overhead we are measuring).
#
# Renderer: run-stress-tests.sh rewrites the /mnt path prefix (hb_render) and may
# override `worker_processes` for the perf scenarios. Drive it with that script.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

# >= 2 so the shared-shm counters and rate buckets see genuine cross-worker
# contention (S3). run-stress-tests.sh may render-override for perf runs.
worker_processes  2;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-stress.pid;
# error level only: a multi-million-request sweep would drown info/notice.
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-stress.log error;

events {
    worker_connections  16384;
}

http {
    # access_log OFF: at stress volumes the disk write dominates and would itself
    # become the bottleneck, masking the WAF overhead we are trying to isolate.
    # (Consequence: $waf_country is NOT evaluated via logging -- the geo vhost
    # forces the lookup with an add_header instead; see vhost 28306.)
    access_log  off;

    # keep-alive generous: h2load/wrk2 reuse a small connection pool for a huge
    # request count; do not let keepalive churn dominate the measurement.
    keepalive_requests  10000000;
    keepalive_timeout   75s;

    # per-IP token-bucket rate-limit zone. HTTP-owned, name "waf_rate"; the stream
    # head resolves THIS zone -> one unified per-IP budget across L7 and L4, which
    # is exactly the shared surface S3 hammers. 16m holds the S2 many-IP sweep.
    waf_rate_zone  size=16m;

    # shared matcher list-set, factored into a map-free include-by-repetition: the
    # enforce/detect/geo vhosts each load the SAME lists so their matcher cost is
    # identical and comparable. (nginx has no list-macro; the repetition is
    # intentional and mirrors heavybag-stat-test.conf.)

    # ---- (a) baseline: waf OFF -- the overhead denominator -----------------
    # waf off => the module's phase handlers early-out, nothing is counted. This
    # vhost is EXCLUDED from every S3 counter invariant by construction.
    server {
        listen       127.0.0.1:28300  reuseport;
        server_name  stress-baseline;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf  off;
        location / { }
    }

    # ---- (b) enforce: full matcher chain, blocks for real -----------------
    server {
        listen       127.0.0.1:28301  reuseport;
        server_name  stress-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;

        waf               on;
        waf_bot_block     on;
        waf_fake_bot_block on;
        waf_scanner_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/ai-crawler.list;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
        waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/bot.list;
        waf_args_list        /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
        waf_cookie_list      /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/cookie.list;
        waf_referer_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/referer.list;
        waf_verified_bot     crawler    /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        waf_verified_bot     ai_crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        location / { }
    }

    # ---- (c) detect: full chain, observes (would_block) but never blocks ---
    # waf_reason_header on => the wire carries X-WAF-Reason so the harness can
    # read per-request verdicts. Detect requests count as ALLOWED (they pass) and
    # the would_block[*] series is an OVERLAY -- excluded from the S3 equality.
    server {
        listen       127.0.0.1:28302  reuseport;
        server_name  stress-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;

        waf               detect;
        waf_reason_header on;
        waf_bot_block     on;
        waf_fake_bot_block on;
        waf_scanner_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/ai-crawler.list;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
        waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/bot.list;
        waf_args_list        /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
        waf_cookie_list      /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/cookie.list;
        waf_referer_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/referer.list;
        waf_verified_bot     crawler    /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        location / { }
    }

    # ---- rate: per-IP token bucket on the shared zone (S2 precision) -------
    # rate=100r/s burst=100 on the "waf_rate" zone keyed by client IP. wrk2 sweeps
    # its arrival rate R around 100 and the harness checks the measured 429-share
    # against the theoretical max(0, R-limit)/R. Minimal matcher set so the rate
    # decision is the dominant signal, not the path/UA chain.
    server {
        listen       127.0.0.1:28303  reuseport;
        server_name  stress-rate;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf  on;
        location / {
            waf_rate_limit  rate=100r/s burst=100;
        }
    }

    # ---- geo-enforce: forces the geo verify cost per request (S1 geo dim) --
    # access_log is off, so $waf_country would never be evaluated; add_header
    # ...always forces the var getter -> a real geo DB lookup on every response,
    # verdict-NEUTRAL (no geo block, so the served/blocked ratio is unchanged and
    # the only delta vs vhost (b) is the lookup cost). waf_trusted_proxy honours
    # the harness X-Forwarded-For so the looked-up IP is the spoofed one, not the
    # loopback peer. SKIPPED by the harness if geodb/location.db is absent.
    server {
        listen       127.0.0.1:28306  reuseport;
        server_name  stress-geo;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_bot_block     on;
        waf_trusted_proxy 127.0.0.1;
        waf_geo_db        /mnt/nvme/imaginarium/openresty/geodb/location.db;
        waf_scanner_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
        location / {
            add_header  X-WAF-Country $waf_country always;
        }
    }

    # ---- (d) H3/QUIC baseline: waf off -------------------------------------
    # nginx 1.30 is built --with-http_v3_module, so the listener stands up even
    # when the LOAD tool lacks QUIC. h2load SKIPs the H3 dimension unless it is
    # built against ngtcp2/nghttp3 (most distro builds are not).
    server {
        listen       127.0.0.1:28304  quic reuseport;
        listen       127.0.0.1:28304  ssl;
        http2        on;
        server_name  stress-h3-baseline;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
        ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
        waf  off;
        location / {
            add_header  Alt-Svc 'h3=":28304"; ma=86400' always;
        }
    }

    # ---- (e) H3/QUIC enforce ----------------------------------------------
    server {
        listen       127.0.0.1:28305  quic reuseport;
        listen       127.0.0.1:28305  ssl;
        http2        on;
        server_name  stress-h3-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
        ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
        waf               on;
        waf_bot_block     on;
        waf_scanner_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
        waf_args_list        /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
        location / {
            add_header  Alt-Svc 'h3=":28305"; ma=86400' always;
        }
    }

    # ---- mail auth_http endpoint (S3 wire-only; moves NO status counter) ---
    # waf off at server level; waf_mail_auth is the content handler. A blocklist
    # range makes the verdict depend on the injected Client-IP: the harness sends
    # Client-IP in 10.0.0.0/8 (deny) and outside it (allow), reading the verdict
    # off the Auth-Status response header on the wire. The loopback request peer
    # is trusted to set Client-IP (heavybag_authhttp.c:167-202).
    server {
        listen       127.0.0.1:28381;
        server_name  stress-mailauth;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     10.0.0.0/8;
        }
    }

    # ---- status: waf off so its own queries never move a counter ----------
    server {
        listen       127.0.0.1:28390;
        server_name  stress-status;
        waf  off;
        location /waf/stat { waf_status; }
    }
}

stream {
    # The stream head proxies to the waf-off HTTP baseline (28300) so the L4 path
    # is exercised end-to-end without the HTTP head double-counting the request.
    # h2load drives plain HTTP at the stream port: the L4 ACCESS-phase reputation
    # + rate run, then the connection is proxied to 28300.
    server {
        listen        127.0.0.1:28391  reuseport;
        waf_stream    on;
        # rate on the SHARED "waf_rate" zone declared in http{} above: a stream
        # connection and an HTTP request from the same loopback IP draw from ONE
        # bucket -> the sharpest lock-free race surface (S3). Generous rate keeps
        # denials rare; the point is concurrent bucket read/modify, not tripping.
        waf_stream_rate_limit  rate=100r/s burst=100;
        proxy_pass    127.0.0.1:28300;
    }
}
