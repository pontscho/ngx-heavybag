# ngx_http_heavybag_module - mail auth_http deep-fuzz config
#
# Deep-fuzz net for the SMTP/IMAP auth_http content handler
# (modules/ngx_http_heavybag/src/heavybag_authhttp.c) -- the QA-campaign
# critic's "un-probed authhttp SMTP" surface. The existing protocol A12 +
# stat SMTP-auth stanzas cover only the trusted-loopback-peer + well-formed
# IPv4 happy path (~30% of the handler). THIS harness drives the 8 fedetlen
# edges enumerated in docs/qa-campaign.md "mail auth_http deep-fuzz":
#
#   #1 missing Client-IP           -> fail-open (allow) + WARN, no crash
#   #2 garbage/oversized Client-IP -> clean fail-open, no crash (crash-safety)
#   #3 IPv6 Client-IP              -> v6 reputation path (blocklisted v6 denies)
#   #4 multiple Client-IP headers  -> first-wins, deterministic
#   #5 untrusted-peer spoof        -> Client-IP IGNORED, connection peer judged
#   #6 geo / asn / flag verdict    -> Auth-Status carries the non-blocklist reason
#   #7 missing waf_mail_backend    -> ERR-log-but-allow, no Auth-Server/Auth-Port
#   #8 rate + geo rule-select      -> for_geo=CC rule chosen via verdict.geo_valid
#
# Drive it with tests/run-mailauth-fuzz.sh.
#
# Security invariants:
#   - ZERO proxy_pass in ANY vhost (the runner asserts this): a mail-auth probe
#     can never be relayed off-box.
#   - Every waf_mail_auth location carries `waf off` at the server level so the
#     HTTP PREACCESS reputation handler never runs on the loopback mail-proxy
#     connection peer and short-circuits the content handler (the documented
#     deployment contract; heavybag_authhttp.c:62).
#
# Port map (286xx; distinct from protocol 285xx / stat 280xx / regression 283xx):
#   base 28601; geo 28602; asn 28603; flag 28604; nobackend 28605;
#   rate 28606; ext-a __HB_EXTIP__:28607; ext-b __HB_EXTIP__:28608.
#
# __HB_EXTIP__ is sed-substituted by the runner with a real non-loopback IPv4
# (for the #5 untrusted-peer vhosts). On a loopback-only host the runner maps it
# to 127.0.0.1 and SKIPs the #5 asserts (the vhosts then bind harmlessly).
#
# Ground-truth IPs (validated at runtime by the oracle reference/geolookup.c
# against geodb/location.db):
#   185.177.72.1 -> FR, AS211590, flags 0x0000
#   8.8.8.8      -> US, AS15169,  flags 0x0004 (anycast)
#   203.0.113.7  -> synthetic (TEST-NET-3), never in geo; blocklist target

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-mailauth.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-mailauth.log info;

events {
    worker_connections  1024;
}

http {
    access_log  off;
    default_type  text/plain;

    # main-conf rate zone: the mail handler reads wmcf->rate_zone for the
    # per-Client-IP token bucket (#8). Without it rate_check fails open.
    waf_rate_zone  size=1m;

    # === #1-#4 base: blocklisted v4 + v6, well-formed + malformed Client-IP ===
    server {
        listen       127.0.0.1:28601;
        server_name  mf-base;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     203.0.113.7/32;       # v4 deny target
            waf_blocklist     2001:db8:bad::/48;     # v6 deny target (#3)
        }
    }

    # === #6a geo: FR is blocked; the deny reason must be "geo country" =========
    server {
        listen       127.0.0.1:28602;
        server_name  mf-geo;
        waf  off;
        waf_geo_db   /mnt/nvme/imaginarium/openresty/geodb/location.db;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_geo_block     FR;
        }
    }

    # === #6b asn: AS15169 (Google) blocked; deny reason must be "asn" ==========
    server {
        listen       127.0.0.1:28603;
        server_name  mf-asn;
        waf  off;
        waf_geo_db   /mnt/nvme/imaginarium/openresty/geodb/location.db;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_asn_block     15169;
        }
    }

    # === #6c flag: anycast (0x0004) blocked; deny reason must be "network flag" =
    server {
        listen       127.0.0.1:28604;
        server_name  mf-flag;
        waf  off;
        waf_geo_db   /mnt/nvme/imaginarium/openresty/geodb/location.db;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_flag_block    anycast;
        }
    }

    # === #7 missing waf_mail_backend: allow logs ERR, no Auth-Server/Auth-Port =
    server {
        listen       127.0.0.1:28605;
        server_name  mf-nobackend;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_blocklist     203.0.113.7/32;   # deny still works without backend
        }
    }

    # === #8 rate + geo rule-select: for_geo=FR strict, default lenient =========
    # FR (185.177.72.1) -> the for_geo=FR rule (burst=1) -> 2nd req rate-limited.
    # US (8.8.8.8)      -> no for_geo match -> default rule (burst=1000) -> OK.
    # Proves rate_rule_select() gates on verdict.geo_valid + country.
    server {
        listen       127.0.0.1:28606;
        server_name  mf-rate;
        waf  off;
        waf_geo_db   /mnt/nvme/imaginarium/openresty/geodb/location.db;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_rate_limit    rate=1r/m    burst=1    for_geo=FR;
            waf_rate_limit    rate=1000r/m burst=1000;
        }
    }

    # === #5a untrusted peer cannot spoof itself clean =========================
    # Connection peer == EXTIP is blocklisted; a benign Client-IP must NOT save
    # it (untrusted peer -> Client-IP ignored -> connection peer judged -> deny).
    server {
        listen       __HB_EXTIP__:28607;
        server_name  mf-ext-a;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     __HB_EXTIP__/32;
        }
    }

    # === #5b untrusted peer's blocklisted Client-IP is ignored ================
    # Connection peer == EXTIP is NOT blocklisted; a blocklisted Client-IP must
    # be IGNORED (untrusted peer) -> allow.
    server {
        listen       __HB_EXTIP__:28608;
        server_name  mf-ext-b;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     203.0.113.7/32;
        }
    }
}
