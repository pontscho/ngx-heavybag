# ngx_http_heavybag_module - JA4<->UA spoof deep-fuzz config ("self-swap")
#
# The QA-campaign critic's "un-probed spoof self-swap" surface. The protocol
# A10 stanza covers only one mismatch (tool-JA4 + Chrome-UA -> 403) plus one
# off-control. This harness drives the full {fam_ja4} x {fam_ua} matrix of
# ngx_http_heavybag_ua_spoof_eval (heavybag_ua_parse.c:717) -- the ja4_signal
# comparison `fam_ja4 != fam_ua` (both must be != UNKNOWN) and the independent
# cidr_signal (verified-bot class from an IP outside its CIDR).
#
# "self-swap": prove the comparison is SYMMETRIC -- swapping which side claims
# which family yields the same verdict (tool-JA4+Chrome-UA AND chromium-JA4+
# curl-UA both spoof; tool+curl AND chromium+Chrome both pass) -- and that an
# UNKNOWN on EITHER side suppresses the signal (no false positive).
#
# Drive it with tests/run-spoof-fuzz.sh.
#
# Mechanism notes (so the matrix is grounded):
#   - fam_ja4 comes from the waf_ja4_list mapping of the OBSERVED JA4. The host's
#     curl has ONE JA4; the runner maps it to a chosen family per reload, so the
#     whole family axis is reachable with a single client. An UNKNOWN fam_ja4 is
#     produced by a ja4.list that does NOT contain the live JA4.
#   - fam_ua comes from the UA header (ua_expected_tls_family:530):
#       CHROMIUM = Chrome/Edge/Opera/Vivaldi/Samsung/YaBrowser/HeadlessChrome
#       FIREFOX  = Firefox ; SAFARI = Safari ; TOOL = curl/wget/python/...
#       UNKNOWN  = anything else (-> never a false-positive spoof)
#   - spoof_block runs BEFORE the fake-bot stage (module.c:1163 vs :1213), so a
#     fake verified-bot is a SPOOF verdict here, not fake_bot.
#
# Port map (288xx): tls-enf 28843; tls-obs 28845; tls-det 28846; cidr 28802.
# Listeners bind 127.0.0.1 only; ZERO proxy_pass (runner asserts).

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-spoof.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-spoof.log info;

events {
    worker_connections  1024;
}

http {
    access_log  off;
    default_type  text/plain;

    waf_reason_header  on;
    waf_bot_block      off;        # never let empty/scanner UA mask the spoof axis

    ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
    ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;

    # === tls-enf: enforce mode -- spoof -> 403 ===============================
    # waf_ja4_list points at a RUNTIME scratch list (the runner writes the live
    # curl JA4 -> chosen family per reload). The fam_ja4 axis lives here.
    server {
        listen       127.0.0.1:28843 ssl;
        server_name  spoof-enf;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              on;
        waf_spoof_block  on;
        waf_ja4_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/.freeze-tmp/spoof-enf-ja4.list;
        add_header   X-JA4    "[$waf_ja4_hash]"     always;
        add_header   X-Spoof  $waf_ua_is_spoofed    always;
        location / { }
    }

    # === tls-obs: observe -- spoof_block OFF -> detected (X-Spoof=1) but 200 ==
    server {
        listen       127.0.0.1:28845 ssl;
        server_name  spoof-obs;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              on;
        waf_spoof_block  off;
        waf_ja4_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/.freeze-tmp/spoof-obs-ja4.list;
        add_header   X-Spoof  $waf_ua_is_spoofed    always;
        location / { }
    }

    # === tls-det: detect mode -- spoof_block on but waf detect -> would-block, 200
    server {
        listen       127.0.0.1:28846 ssl;
        server_name  spoof-det;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              detect;
        waf_spoof_block  on;
        waf_ja4_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/.freeze-tmp/spoof-obs-ja4.list;
        add_header   X-Spoof  $waf_ua_is_spoofed    always;
        location / { }
    }

    # === cidr: plaintext -- cidr_signal (fake verified-bot) -> spoof =========
    # A UA classified as a crawler (waf_crawler_list) whose canonical client IP
    # (XFF-resolved) is outside the verified_bot CIDR -> spoof. No TLS/JA4 here:
    # this exercises the cidr_signal half of spoof_eval in isolation.
    server {
        listen       127.0.0.1:28802;
        server_name  spoof-cidr;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                on;
        waf_spoof_block    on;
        waf_trusted_proxy  127.0.0.1;
        waf_crawler_list   /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
        waf_verified_bot   crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/.freeze-tmp/spoof-verified-bot.cidr;
        location / { }
    }
}
