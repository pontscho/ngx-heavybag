# ngx_http_heavybag_module - Phase 6 protocol-lifecycle + decode/cookie config
#
# Live-fire integration net for the QA test-matrix campaign (docs/qa-campaign.md
# "protocol-lifecycle (13)" + the module.c decode/cookie half of "match-redos").
# Where the unit suite (tests/unit/) freezes the pure-core contracts byte-for-byte,
# THIS harness drives the request-lifecycle paths that only exist with a live
# ngx_http_request_t: keepalive ctx isolation, TLS JA4 over a real handshake,
# H2 stream multiplexing, internal-redirect count-once, plaintext JA4 no-op,
# log-phase lazy ctx, TLS resumption JA4 degrade, spoof body-filter, and the
# percent-decode / Cookie ngx_list walk in ngx_http_heavybag_sig_lookup_decoded
# + ngx_http_heavybag_sig_cookie_lookup (module.c:856/887).
#
# Drive it with tests/run-protocol-tests.sh.
#
# Security invariants (inherited from heavybag-regression-test.conf):
#   - ZERO proxy_pass in ANY vhost: every location is static-file backed, so a
#     hostile request can never be relayed off-box. run-protocol-tests.sh asserts
#     the zero-proxy_pass invariant on this file.
#   - All listeners bind 127.0.0.1 ONLY.
#   - No waf_geo_db (no signed-DB load cost; geo not exercised here -- the geo
#     walk has its own unit + Fix-round-3 live test).
#
# Port map (285xx, all free; distinct from stat 280xx, regression 283xx):
#   status 28500; keepalive 28501; plaintext 28502; redirect 28503;
#   logphase 28504; ssi 28505; mailauth 28506; args 28507; cookie 28508;
#   tls 28543; spoof-tls 28545.
#
# Self-contained: high test ports + its own pid/log files.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-protocol.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-protocol.log info;

events {
    worker_connections  1024;
}

http {
    access_log  off;
    default_type  text/plain;

    # X-WAF-Reason on every response so the harness can assert the (reason,status)
    # tuple. Defaults OFF in production; the test harness turns it on.
    waf_reason_header  on;

    # bot-block OFF by default so an empty/scanner UA never masks a non-UA
    # dimension; no vhost here needs UA classification.
    waf_bot_block      off;

    # generous keepalive so the L1/L2/L3 reuse tests share one connection.
    keepalive_requests  100000;
    keepalive_timeout   75s;

    ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
    ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
    ssl_protocols        TLSv1.2 TLSv1.3;
    # session reuse enabled so the L8 resumption-degrade test can resume a session.
    ssl_session_cache    shared:proto_ssl:1m;
    ssl_session_tickets  on;

    # log-phase ctx test (L13): a format that references $waf_* on a waf-off vhost.
    log_format  waftest  'type=$waf_type spoof=$waf_ua_is_spoofed';

    # === status: waf off so its own queries are never counted ===============
    server {
        listen       127.0.0.1:28500;
        server_name  prot-status;
        waf  off;
        location /waf/stat { waf_status; }
    }

    # === keepalive: scanner-path matcher; L1 fresh-ctx + L11 pipelining ======
    server {
        listen       127.0.0.1:28501;
        server_name  prot-keepalive;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        location / { }
    }

    # === plaintext: L7 JA4 no-op on a non-TLS listener (no NULL deref) =======
    server {
        listen       127.0.0.1:28502;
        server_name  prot-plaintext;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        # $waf_ja4_hash must resolve to empty on a plaintext connection, no crash.
        add_header   X-JA4  "[$waf_ja4_hash]"  always;
        location / { }
    }

    # === redirect: L4 count-once + L9 XFF client_sa re-derive ================
    # error_page 404 internal-redirects to /index.html on the SAME main request
    # (r->internal==1). waf_trusted_proxy honours XFF so the redirect hop must
    # re-derive the identical client IP.
    server {
        listen       127.0.0.1:28503;
        server_name  prot-redirect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                on;
        waf_scanner_list   /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        waf_trusted_proxy  127.0.0.1;
        waf_blocklist      198.51.100.9/32;   # L9: XFF-derived client IP, blocklisted
        error_page   404  /index.html;
        location / { }
    }

    # === logphase: L13 lazy ctx creation at log phase when PREACCESS skipped ==
    # waf off -> PREACCESS returns DECLINED before any ctx; the $waf_* getters
    # run at LOG phase and must lazily create ctx (or default safely), no crash.
    server {
        listen       127.0.0.1:28504;
        server_name  prot-logphase;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf          off;
        access_log   /mnt/nvme/imaginarium/openresty/sandbox/logs/protocol-logphase.log  waftest;
        location / { }
    }

    # === ssi: L5 subrequest never re-scanned (r != r->main) ==================
    # The SSI include issues a subrequest; PREACCESS bails on r != r->main, so a
    # scanner-path subrequest must NOT bump blocked_scanner_path.
    server {
        listen       127.0.0.1:28505;
        server_name  prot-ssi;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        location / { ssi on; }
    }

    # === mailauth: L12 auth_http reputation path bypasses ctx/JA4 ============
    # waf off (no HTTP PREACCESS); the waf_mail_auth content handler runs its own
    # reputation_check on the Client-IP header ngx_mail supplies -- no request ctx,
    # no TLS, no JA4. waf_blocklist rejects the loopback test peer's Client-IP.
    server {
        listen       127.0.0.1:28506;
        server_name  prot-mailauth;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     203.0.113.7/32;   # reject this synthetic Client-IP
        }
    }

    # === args: B1-B7 percent-decode vectors (controlled args list) ===========
    server {
        listen       127.0.0.1:28507;
        server_name  prot-args;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf            on;
        waf_args_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/protocol-args.list;
        location / { }
    }

    # === cookie: B8-B10 whole-value match + multi-Cookie walk ================
    server {
        listen       127.0.0.1:28508;
        server_name  prot-cookie;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              on;
        waf_cookie_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/protocol-cookie.list;
        location / { }
    }

    # === tls: L2 keepalive JA4 stable + L3a H2 multiplex + L8 resumption =====
    server {
        listen       127.0.0.1:28543 ssl;
        http2        on;
        server_name  prot-tls;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        add_header   X-JA4       "[$waf_ja4_hash]"  always;
        add_header   X-WAF-Type  $waf_type          always;
        location / { }
    }

    # === spoof-tls: L10 spoof body-filter emits once =========================
    # waf_ja4_list points at a RUNTIME-generated scratch list (the harness reads
    # the live curl JA4, maps it -> tool, then reloads) so the test is portable
    # across machines/OpenSSL builds rather than pinning a hard-coded fingerprint.
    server {
        listen       127.0.0.1:28545 ssl;
        server_name  prot-spoof;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_spoof_block   on;
        waf_ja4_list      /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/tests/corpus/.freeze-tmp/protocol-ja4.list;
        add_header   X-JA4    "[$waf_ja4_hash]"     always;
        add_header   X-Spoof  $waf_ua_is_spoofed    always;
        location / { }
    }
}
