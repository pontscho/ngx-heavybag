          pattern_excerpt: |
            ngx_int_t
            ngx_http_waf_reputation_check(ngx_waf_rep_conf_t *rep,
                struct sockaddr *sa, ngx_str_t *reason)
            {
                uint16_t                    cc16, *codes;
                ngx_uint_t                  i;
                ngx_http_waf_geo_result_t   res;

