implementation_notes: |
  All 12 tasks implemented, build clean under -Werror -W -Wall, 32/32 curl
  integration assertions pass. Sound deviations from the plan pseudocode:
  (1) STREAM cannot include ngx_http.h, so the shm layout struct stays
      HTTP-only in waf_status.h and the STREAM head pokes counters through
      opaque-pointer helpers (ngx_http_waf_stat_cc_bump / _stream_bump)
      declared in the ngx_core-only waf_rep.h and defined in
      ngx_http_waf_module.c (so they link without waf_status.c).
  (2) STREAM stores the resolved zone in a file-static pointer (singleton).
  (3) init(zone,data) follows ngx_http_limit_req_module: shm_zone->data holds
      the main conf at add-time (to size from nvhosts) then is swapped to the
      struct pointer; HTTP reads wmcf->stat_zone->data, STREAM reads its
      zone->data, both yield the same struct.
  (4) geo-DB health block emits network-count + mapped size only (the geo_db
      struct does not retain created-at/vendor); never the path.
  (5) Internal redirects (index/try_files; r==r->main, r->internal) re-run the
      preaccess handler and thus re-count - the plan required only subrequest
      (r!=r->main) dedup, which is implemented; re-counting mirrors how the
      WAF itself re-evaluates redirects.
