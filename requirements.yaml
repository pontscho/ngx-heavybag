original_request: |
  Add a lock-free statistics / status subsystem to the existing ngx_http_waf
  module (one .so containing ngx_http_waf_module HTTP + ngx_stream_waf_module
  STREAM). Maintain cross-worker counters of every WAF verdict, the UA
  classification distribution, and bounded dimensional breakdowns (per-country,
  per-vhost) in a single shared-memory zone of ngx_atomic_t counters (no slab on
  the hot path, no rbtree, no mutex). Expose them over an HTTP endpoint analogous
  to stub_status via a `waf_status;` content-handler directive in three formats
  selected by URI path (/waf/stat/prometheus, /waf/stat/json, /waf/stat/plain).
  Re-export the nginx core stub_status connection table behind #if (NGX_STAT_STUB).
  Add two new log-format variables $waf_country and $waf_reason alongside $waf_type,
  sharing one per-request verdict decision (one geo lookup per request, cached in
  the request ctx).
goal: |
  Translate the two-phase-validated feature plan
  (docs/feature-implementation-plan.md) into a function-level, dependency-ordered
  implementation of a lock-free WAF stats/status subsystem: a reason-enum single
  source of truth, an extended reputation_check with a write-only verdict out-param,
  a single shm atomic counter zone (HTTP+STREAM share it via name+tag), counter
  increments on the existing verdict choke points, two new log variables, a
  waf_status content-handler directive, and three escaping-safe serializers
  (plain/json/prometheus), plus the build glue.
complete: true
requirements:
  - category: architecture
    question: How is shared cross-worker state maintained given the module has no main/srv conf today?
    answer: |
      Introduce create_main_conf/init_main_conf (shm zone pointer + nvhosts) and
      create_srv_conf/merge_srv_conf (per-vhost stat index) on the HTTP module ctx
      (currently NULL at ngx_http_waf_module.c:200-204). A single always-on shm zone
      "waf_status" holds one fixed ngx_atomic_t counter struct allocated once via
      ngx_slab_alloc at init; the hot path is lock-free (ngx_atomic_fetch_add only).
    details:
      - No shared writable state exists today (ngx_http_waf.h:57-61 documents this).
      - Core overlays an ngx_slab_pool_t on every shm zone; slab used ONLY for the
        one-time struct alloc at init, never on the request path.
      - STREAM module cannot read HTTP main conf; it resolves the SAME zone via
        ngx_shared_memory_add with size=0 and tag=&ngx_http_waf_module.
    options: []
    status: answered
  - category: architecture
    question: How are per-reason counters and the $waf_reason variable derived without parsing log strings?
    answer: |
      Introduce ngx_http_waf_reason_e enum in waf_rep.h (ngx_core-only header included
      by the stream TU) as the single source of truth feeding the counter index, the
      $waf_reason variable string, and (optionally) the human log message. A parallel
      waf_reason_str[] table lives in ngx_http_waf_module.c next to waf_type_str[].
    details:
      - The 403 verdict is overloaded (blocklist / network-flag / geo-country) and was
        previously distinguished only by the human reason string.
      - reputation_check gains a write-only ngx_http_waf_verdict_t *out param setting
        out->reason on every return path.
    options: []
    status: answered
  - category: data
    question: What dimensions are tracked and how are they bounded?
    answer: |
      Global verdict counters, per-reason block counts (http_blocked[WAF_REASON_MAX]),
      scanner-path status split [404,403,444], response-code counters, UA distribution
      (http_ua[WAF_UA_MAX]), per-flag breakdown (4 real libloc bits: anon/satellite/
      anycast/drop), per-country {total,blocked,cc16} open-addressed table (512 slots),
      and a per-vhost block array sized at init from the server{} count. STREAM has its
      own global + stream_denied[WAF_REASON_MAX] block plus the shared per-country table.
    details:
      - Country space (ISO-3166 + libloc specials A1/A2/A3/T1/XD) is a closed set < ~512.
      - Tor has NO libloc flag bit; it surfaces as a CC "T1" geo-country verdict.
      - Top-N client-IP tracking is explicitly OUT of scope (high cardinality, lock-hot).
    options: []
    status: answered
  - category: security
    question: What must be enforced to keep the endpoint safe?
    answer: |
      Escape all attacker-influenceable output unconditionally at the boundary (JSON
      RFC 8259; Prometheus label values escape \\, ", \n) - do NOT trust geo-DB bytes
      or server names. Integer-overflow guard on zone-size and buffer-size math.
      NULL-guard every out-> write in reputation_check (SMTP-auth passes NULL); verdict
      return paths stay byte-identical. Content handler runs in the content phase AFTER
      the access phase so allow/deny is enforced before any counter render. The geo-DB
      health block exposes created-at/vendor/network-count only - never the DB path or
      build-host.
    details:
      - The "2 printable uppercase ASCII" country-byte property is an assumption, not
        a validated invariant.
      - Endpoint exposes operational counters only: no PII, no client IPs, no bodies.
    options: []
    status: answered
  - category: interface
    question: How is the endpoint surfaced and how is format selected?
    answer: |
      A new `waf_status;` directive (NGX_HTTP_LOC_CONF|NGX_CONF_NOARGS, mirroring the
      waf_mail_auth NOARGS template at ngx_http_waf_module.c:178-183) whose set handler
      sets clcf->handler = ngx_http_waf_status_handler. The handler restricts to
      GET/HEAD (else NGX_HTTP_NOT_ALLOWED), snapshots the shm struct, parses the last
      URI path segment (/waf/stat/{prometheus,json,plain}, default plain) and dispatches
      to the serializer. Two new NOCACHEABLE log variables $waf_country and $waf_reason
      are registered in preconfiguration.
    details:
      - Operators add an access-restricted location (allow/deny) per the plan; the
        module documents but does not enforce network policy.
      - Variable getter contract: v->len/v->data/v->valid=1/v->no_cacheable=1/v->not_found.
    options: []
    status: answered
  - category: implementation
    question: Where do counter increments live and how is double counting avoided?
    answer: |
      In ngx_http_waf_preaccess_handler (:286-347) - the single HTTP verdict choke
      point - after the early guards (r != r->main, !wlcf->enable) and the ctx-ensure
      block: bump http_requests_total ONCE, then at each verdict return set
      ctx->reason+verdict_set and bump the matching global / per-vhost / (if geo_done)
      per-country counters. Mirror in ngx_stream_waf_handler (waf_stream.c:142-165):
      stream_connections_total once, then stream_allowed / stream_denied[out.reason]
      and the shared per-country slot when out.geo_valid. Subrequests return early.
    details:
      - One geo lookup per request via the shared ctx cache (country/geo_done).
      - cc_bump is lock-free open-addressed (ngx_atomic_cmp_set claim, cc16==0 empty
        sentinel, cc_overflow guard).
    options: []
    status: answered
constraints:
  - type: technical
    description: |
      The counter HOT PATH must be lock-free (ngx_atomic_fetch_add only): no slab
      allocation, no rbtree, no shared mutex per request. The ngx_slab_pool_t header
      that core overlays on every shm zone is used ONLY for the one-time ngx_slab_alloc
      of the fixed struct at init.
    impact: |
      Forces a single fixed atomic struct with bounded dimensions (closed-set country
      table, config-time vhost array); rules out unbounded keys / per-IP tracking.
  - type: technical
    description: |
      reputation_check is shared by HTTP, STREAM, and SMTP-auth. The signature change
      (trailing out param) must remain backward-safe: callers that do not want geo
      output (SMTP-auth) pass NULL, and out is write-only side data that never alters
      the control flow / security decision of any caller.
    impact: |
      All three call sites must be updated in the same change or the build breaks;
      every out-> write must be NULL-guarded; verdict return paths stay byte-identical.
  - type: technical
    description: |
      The reason enum + verdict type must live in waf_rep.h (ngx_core-only), NOT
      ngx_http_waf.h (which pulls ngx_http.h). The stream TU includes only waf_rep.h.
      The verdict struct must store primitive geo fields (country[2], flags), not the
      ngx_http_waf_geo_result_t by value (that type lives in waf_geo.h).
    impact: Placement error breaks the STREAM translation unit compile.
  - type: technical
    description: |
      shm reload re-attach: the init(zone, data) callback distinguishes reload
      (data argument non-NULL = previous cycle's struct), re-attach (zone->shm.exists),
      and fresh start (ngx_slab_alloc + memzero + stamp start_time). zone->data is
      ALWAYS NULL at init - keying off it is wrong. STREAM passes size=0 and sets no
      init of its own. A change in server{} count changes the zone size, forces a fresh
      segment, and resets counters (documented, accepted).
    impact: |
      Copy the ngx_http_limit_req_module.c:728-741 init pattern verbatim; nvhosts must
      be counted BEFORE the zone is added (it sizes the zone).
  - type: security
    description: |
      Output escaping at the boundary is mandatory and unconditional (JSON + Prometheus);
      integer-overflow guard on all size math; NULL-guard the out param; access-phase
      ordering enforced before render; no filesystem-path / build-host leak in the
      geo-DB health block.
    impact: |
      Encoded as task implementation_details and test_requirements; a missed escape is
      an output-injection vulnerability via a hostile geo DB or server name.
  - type: business
    description: |
      No new third-party dependency; English code/comments/docs; tab indentation,
      snake_case, nginx idioms; existing directives, verdicts, status codes and
      $waf_type unchanged.
    impact: Build is config-only (no CMakeLists change); no config breakage.
success_criteria:
  - GET /waf/stat/plain returns a stub_status-style block with WAF verdict counters and (when NGX_STAT_STUB) the core connection table.
  - GET /waf/stat/prometheus returns valid text-exposition output with bounded labels only (reason, country, server, flag) - never a raw client IP.
  - GET /waf/stat/json returns a well-formed JSON object with the same data nested.
  - Triggering each verdict class increments exactly the corresponding counter, verified across all three formats.
  - A STREAM-level reputation block increments the STREAM counter block (stream_denied[reason]).
  - $waf_type is unchanged; $waf_country resolves to the 2-letter ISO code when a geo record exists (and geo configured) else not_found; $waf_reason resolves to the verdict token.
  - At most ONE geo lookup per request even when $waf_country + geo blocking + per-country counter are all active (shared ctx cache).
  - Per-country counters increment ONLY when a geo lookup actually ran; with geo disabled no per-country data and no extra lookup.
  - Counters survive nginx -s reload (shm re-attach) as long as the zone size (server{} count) is unchanged.
  - nginx -t passes; the .so loads; no regression in existing WAF behaviour.
  - SMTP-auth path (out == NULL) does not NULL-deref and its allow/deny verdict is unchanged.
  - Hostile geo-DB / server_name bytes (", \\, control chars, newline) do not break JSON or Prometheus output.
context_summary:
  error_handling: |
    nginx convention: return NGX_ERROR / NGX_DECLINED / NGX_HTTP_* per call.
    ngx_pcalloc/alloc failure -> NGX_ERROR. shm allocation failure at init ->
    NGX_ERROR (nginx fails to start with a "waf: cannot allocate status zone" emerg).
    Status handler rejects non-GET/HEAD with NGX_HTTP_NOT_ALLOWED. Per-country table
    full -> bump cc_overflow and skip (defensive).
  memory_management: |
    Request-pool ctx (freed with the request, no manual cleanup). shm struct is a
    one-time ngx_slab_alloc from the slab pool overlaid by core; plain ngx_atomic_t
    fields + fixed arrays, no per-element alloc, no free path. No per-request alloc on
    the counter path. reputation_check's out param is caller-stack owned.
  logging_pattern: |
    "waf: " prefix; NGX_LOG_INFO for verdicts, NGX_LOG_WARN for config warnings,
    NGX_LOG_EMERG / ngx_conf_log_error for config errors; errno arg always 0;
    %V for ngx_str_t *, %i for ngx_int_t. Counters ARE the signal - no per-request
    stats logging; optional NGX_LOG_DEBUG_HTTP trace in the status handler.
  naming_conventions: |
    ngx_http_waf_ prefix, snake_case identifiers, UPPER_CASE macros, WAF_* enum
    constants, tab indentation. New variables mirror $waf_type exactly.
  key_patterns:
    - Lock-free atomics only on the hot path (ngx_atomic_fetch_add / ngx_atomic_cmp_set).
    - Reason-enum as the single source feeding counter index + $waf_reason variable + human log string.
    - One geo lookup per request via the shared ctx cache (country/geo_done).
    - Bounded dimensions only (closed-set country table, config-time vhost array) - never per-IP.
    - Unconditional output escaping at the serializer boundary (do not trust geo-DB bytes).
    - shm init follows ngx_http_limit_req_module.c:728-741 (data arg + shm.exists, not zone->data==NULL).
    - STREAM resolves the same zone via name+tag with size=0 and sets no init of its own.
